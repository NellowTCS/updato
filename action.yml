name: Updato
description: Publish build artifacts to a cdn branch for decentralized updates
author: NellowTCS
branding:
  icon: upload-cloud
  color: blue
inputs:
  mode:
    description: Publishing mode - "commit" or "version"
    required: true
    default: "commit"
  dist_dir:
    description: Directory containing build output relative to repo root
    required: true
    default: "dist"
  build_script:
    description: Optional build command to run before publishing
    required: false
    default: ""
  version:
    description: Explicit version override for version mode
    required: false
    default: ""
  cdn_branch:
    description: Target branch for cdn artifacts
    required: false
    default: "cdn"
  user_name:
    description: Git user name for commits
    required: false
    default: "updato"
  user_email:
    description: Git user email for commits
    required: false
    default: "updato@users.noreply.github.com"
runs:
  using: node20
  main: dist/index.js


