name: GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        working-directory: Build
        run: npm run build

      - name: Build demo
        working-directory: Demo
        run: npm ci && npm run build

      - name: Build docs
        working-directory: Docs
        run: npm ci && npm run build

      - name: Prepare pages root
        run: |
          mkdir -p pages-root/demo
          cp -r Demo/dist/* pages-root/demo/
          cp -r Docs/site/* pages-root/
          cp Demo/dist/index.html pages-root/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages-root
          commit_message: "deploy: demo + docs"
