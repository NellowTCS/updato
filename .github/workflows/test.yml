name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Test Client
        working-directory: Build
        run: npx jest --silent

      - name: Test Action
        working-directory: Action
        run: npx jest --silent

      - name: Test Worker
        working-directory: Worker
        run: npx jest --silent
